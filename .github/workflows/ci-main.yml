name: Main Branch — Test, Gate, Canary, Verify

# Flow:
#   Push to main → Vercel builds (held by Required Checks)
#   → CI: unit + integration tests pass → notify Vercel
#   → Vercel promotes → CI: E2E runs against stable per-deployment URL
#   → All pass → Vercel starts Rolling Release (10%)
#   → Canary verification: traffic sim + full E2E + log check on ahasw.com
#   → Pass → auto-advance to 100% | Fail → rollback
#
# Setup in Vercel:
#   1. Project Settings → Git → Required Checks → add all check names below
#   2. Project Settings → Rolling Releases → stages: 10%, 100%
#   3. Enable Skew Protection
#
# Setup in GitHub (Repository Settings → Environments):
#   4. Create a "production-migrations" environment
#      • Add required reviewers so every push to main must be approved before
#        payload migrate runs against the production database.
#      • Add DATABASE_URL and PAYLOAD_SECRET as environment secrets.
#   5. Ensure the "production" environment also has access to DATABASE_URL and
#      PAYLOAD_SECRET (e.g., duplicate them as environment secrets, or keep
#      them as repo-level secrets), along with all other production secrets,
#      since other jobs in this workflow run with environment: production.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      seed:
        description: "Run database seed after migrations"
        required: false
        type: boolean
        default: false

permissions:
  statuses: write
  contents: read
  deployments: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  PRODUCTION_URL: ${{ vars.PRODUCTION_URL || 'https://ahasw.com' }}

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  # ─── Migration dry run ───────────────────────────────────────────────────────
  # Runs automatically on every push — no approval needed, no DB changes.
  # Shows pending migrations (or "nothing to migrate") so you can decide
  # whether to approve the real migration step below.

  migrate-dry-run:
    name: Migration Dry Run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    outputs:
      has_pending: ${{ steps.check.outputs.has_pending }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Check migration status
        id: check
        run: |
          STATUS=$(bunx payload migrate:status 2>&1)
          echo "$STATUS"
          if echo "$STATUS" | grep -q ' No'; then
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "--- Pending migrations detected ---"
          else
            echo "has_pending=false" >> $GITHUB_OUTPUT
            echo "--- All migrations already applied ---"
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}

  # ─── Migration (requires approval) ──────────────────────────────────────────
  # Only runs when migrate-dry-run detects pending migrations.
  # Gated behind the "production" environment approval.

  migrate:
    name: Run Migrations
    needs: [migrate-dry-run]
    if: always() && needs.migrate-dry-run.result == 'success' && needs.migrate-dry-run.outputs.has_pending == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx payload migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}

  # ─── Optional seed (manual trigger only) ─────────────────────────────────────
  # Only runs when workflow is manually dispatched with seed=true.
  # Approve the migration step first, then seed runs automatically after.

  seed:
    name: Seed Database
    needs: [migrate]
    if: always() && needs.migrate.result == 'success' && (github.event_name == 'workflow_dispatch' && inputs.seed == true)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

  # ─── Pre-deploy gates ────────────────────────────────────────────────────────

  unit-tests:
    needs: [migrate, seed]
    if: always() && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test:unit
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      - name: Notify Vercel
        if: always()
        continue-on-error: true
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - aha-software-marketing: Unit Tests"

  integration-tests:
    # We need to fix this
    needs: [migrate, seed]
    if: always() && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test:integration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      - run: bun run tests/cleanup.ts
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      - name: Notify Vercel
        if: always()
        continue-on-error: true
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - aha-software-marketing: Integration Tests"

  # ─── E2E against stable per-deployment URL ───────────────────────────────────
  # Runs after unit/integration pass. Polls the Vercel REST API for the
  # deployment tied to this exact commit SHA — guaranteed to be the new code,
  # 100% of requests, before any traffic reaches it.

  e2e-tests:
    name: E2E Tests (Playwright)
    needs: [unit-tests, integration-tests]
    if: always() && needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install chromium --with-deps

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Poll Vercel REST API for the deployment tied to this commit SHA.
      # VERCEL_TOKEN is already in env from the workflow-level env block.
      # Retries up to 30×10s (5 min) — enough for Vercel's build + boot.
      - name: Get per-deployment URL
        id: get-deploy-url
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "Looking for Vercel deployment for commit ${{ github.sha }}..."
          for i in $(seq 1 30); do
            RESPONSE=$(curl -sf \
              "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&limit=10&teamId=${VERCEL_ORG_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" 2>/dev/null || echo '{}')

            # Accept any state except ERROR/CANCELED — the deployment URL is
            # live and serving as soon as Vercel finishes building, even while
            # it's held at QUEUED/BUILDING/READY waiting for required checks.
            DEPLOY_URL=$(echo "$RESPONSE" | \
              jq -r --arg sha "${{ github.sha }}" \
              '.deployments[] | select(.meta.githubCommitSha == $sha and (.state == "READY" or .state == "BUILDING" or .state == "QUEUED")) | .url' | \
              head -1)

            if [ -n "$DEPLOY_URL" ]; then
              FULL_URL="https://${DEPLOY_URL}"
              # Bypass Vercel Deployment Protection with the automation secret
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$FULL_URL" \
                -H "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" \
                2>/dev/null || echo "000")
              if [ "$STATUS" != "000" ] && [ "$STATUS" -lt 500 ]; then
                echo "url=${FULL_URL}" >> $GITHUB_OUTPUT
                echo "Deployment live at: ${FULL_URL} (HTTP $STATUS)"
                exit 0
              fi
              echo "Attempt $i/30 — deployment found but not yet serving (HTTP $STATUS), waiting 10s..."
            else
              echo "Attempt $i/30 — no deployment found yet, waiting 10s..."
            fi

            sleep 10
          done

          echo "::error::Timed out waiting for Vercel deployment for commit ${{ github.sha }}"
          exit 1

      - name: Run Playwright E2E against per-deployment URL
        run: bun run test:e2e && bun run tests/cleanup.ts
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.get-deploy-url.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Notify Vercel
        if: always()
        continue-on-error: true
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - aha-software-marketing: E2E Tests"

  # ─── Canary verification ─────────────────────────────────────────────────────
  # Runs after E2E passes. By this point Vercel's Required Checks are satisfied
  # and Rolling Releases has started the canary at 10%.
  # Targets ahasw.com with vcrrForceCanary=true to pin requests to the new deploy.
  # Three checks: traffic simulation, full Playwright E2E, Vercel runtime log scan.

  canary-verification:
    name: Canary Verification
    needs: [e2e-tests]
    if: always() && needs.e2e-tests.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install chromium --with-deps

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Wait for canary to be live
        run: |
          echo "Waiting 30s for Rolling Release to start canary..."
          sleep 30
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "${PRODUCTION_URL}/?vcrrForceCanary=true" \
            -H "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" \
            2>/dev/null || echo "000")
          echo "Canary HTTP status: $STATUS"
          if [ "$STATUS" = "000" ] || [ "$STATUS" -ge 500 ]; then
            echo "::error::Canary is not responding (status $STATUS)"
            exit 1
          fi
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Traffic simulation on canary (50 req/page)
        run: |
          PAGES=("/" "/blog" "/events" "/premium" "/contact" "/services" "/login" "/register" "/sitemap.xml" "/robots.txt")
          ERRORS=0
          TOTAL=0

          for page in "${PAGES[@]}"; do
            if [[ "$page" == *.xml ]] || [[ "$page" == *.txt ]]; then
              URL="${PRODUCTION_URL}${page}"
            else
              URL="${PRODUCTION_URL}${page}?vcrrForceCanary=true"
            fi

            for i in $(seq 1 50); do
              TOTAL=$((TOTAL + 1))
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL" \
                -H "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}" \
                2>/dev/null || echo "000")
              if [ "$STATUS" -ge 500 ]; then
                ERRORS=$((ERRORS + 1))
                echo "ERROR on $URL — HTTP $STATUS"
              fi
            done
            echo "$page: 50 requests done"
          done

          echo "Total: $TOTAL requests, $ERRORS server errors"
          if [ "$ERRORS" -gt $((TOTAL / 100)) ]; then
            echo "::error::Error rate exceeds 1% on canary ($ERRORS/$TOTAL)"
            exit 1
          fi
          echo "Traffic simulation passed"
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Bun Full Tests
        run: |
          bun run build && bun run start &
          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server started after $i attempts"
              break
            fi
            echo "Attempt $i/30 server not ready yet, waiting 2s..."
            sleep 2
            if [ "$i" -eq 30 ]; then
              echo "::error::Server failed to start after 30 attempts"
              exit 1
            fi
          done
          bun run test:coverage 
          bun run tests/cleanup.ts          
          echo "Full tests completed"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

      - name: Playwright smoke tests on canary
        # Runs only @smoke-tagged tests — one per critical route.
        # VCRR_FORCE_CANARY triggers canary-setup.ts globalSetup which visits
        # /?vcrrForceCanary=true to pin the Vercel rolling-release cookie before
        # any tests run. All workers inherit that session via storageState.
        run: bun run test:e2e -- --grep "@smoke"
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.PRODUCTION_URL }}
          VCRR_FORCE_CANARY: "true"
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Check Vercel runtime logs for errors
        run: |
          # vercel logs uses VERCEL_TOKEN from env automatically
          LOG_OUTPUT=$(vercel logs "$PRODUCTION_URL" --since 10m 2>&1 || true)
          ERROR_COUNT=$(echo "$LOG_OUTPUT" | grep -ci "error" || true)
          echo "Runtime log errors in last 10m: $ERROR_COUNT"
          if [ "$ERROR_COUNT" -gt 10 ]; then
            echo "::error::Too many runtime errors on canary ($ERROR_COUNT in last 10m)"
            echo "$LOG_OUTPUT" | grep -i "error" | head -20
            exit 1
          fi
          echo "Log check passed"

      - name: Notify Vercel
        if: always()
        continue-on-error: true
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - aha-software-marketing: Canary Verification"

  # ─── Rollback on canary failure ───────────────────────────────────────────────

  rollback-on-failure:
    name: Rollback on Canary Failure
    needs: [canary-verification]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.canary-verification.result == 'failure'
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Roll back production
        run: |
          echo "::error::Canary verification FAILED — rolling back..."
          vercel rollback --yes
          echo "Rollback complete"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Summary
        run: |
          echo "## Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: 🔴 ROLLED BACK" >> $GITHUB_STEP_SUMMARY
          echo "- **Reason**: Canary verification failed" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ─── Success summary ──────────────────────────────────────────────────────────

  deploy-success:
    name: Deploy Success
    needs: [canary-verification]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always() && needs.canary-verification.result == 'success'
    steps:
      - name: Summary
        run: |
          echo "## Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ SUCCESS" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **E2E**: Passed against per-deployment URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Canary**: Traffic sim passed, E2E passed, logs clean" >> $GITHUB_STEP_SUMMARY
          echo "- **Rolling Release**: Auto-advancing to 100%" >> $GITHUB_STEP_SUMMARY
