name: Feature Branch CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches-ignore: [main]

permissions:
  statuses: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - name: Notify Vercel
        if: always()
        continue-on-error: true
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - aha-software-marketing: Lint & Typecheck"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    environment: preview
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test:unit
      - run: bun run test:coverage
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ci-test-secret
      - name: Notify Vercel
        if: always()
        continue-on-error: true
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - aha-software-marketing: Unit Tests"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    environment: preview
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ci-test-secret
          NEXT_PUBLIC_SITE_URL: https://aha-software-marketing.vercel.app
      - name: Notify Vercel
        if: always()
        continue-on-error: true
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - aha-software-marketing: Build"
